name: CI

on:
  push:
    branches: [ "main", "copilot/**", "claude/**" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  format-check:
    name: Check formatting (clang-format)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends clang-format

      - name: Check changed files
        run: |
          BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          FILES=$(git diff --name-only "$BASE"...HEAD -- '*.cpp' '*.hpp' 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No C++ files changed – skipping format check."
            exit 0
          fi
          echo "Checking format of: $FILES"
          echo "$FILES" | xargs clang-format --dry-run --Werror

  # Task 2.2: headless test job – builds and runs all tests with no SDL/OpenGL
  # dependency, proving tests run without a display server.
  test-headless:
    name: Headless tests (no display required)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install minimal dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential \
            libboost-dev \
            libsqlite3-dev

      - name: Configure (tests only, no game build)
        run: |
          cmake -S . -B build-headless \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGAMEPLAYFOOTBALL_BUILD_GAME=OFF \
            -DBUILD_TESTING=ON

      - name: Build tests
        run: cmake --build build-headless --parallel $(nproc)

      - name: Run tests (headless – no DISPLAY needed)
        run: ctest --test-dir build-headless --output-on-failure

  clang-tidy:
    name: Static analysis (clang-tidy)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential clang-tidy \
            libgl1-mesa-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-gfx-dev \
            libopenal-dev \
            libboost-system-dev libboost-signals2-dev \
            libsqlite3-dev

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy on changed files
        run: |
          BASE="${{ github.event.pull_request.base.sha || 'HEAD~1' }}"
          FILES=$(git diff --name-only "$BASE"...HEAD -- 'src/*.cpp' 'src/**/*.cpp' 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No C++ source files changed – skipping clang-tidy."
            exit 0
          fi
          echo "Running clang-tidy on: $FILES"
          echo "$FILES" | xargs -r clang-tidy -p build --warnings-as-errors='*' \
            --header-filter='src/.*' 2>&1 | tee tidy-output.txt
          grep -c "error:" tidy-output.txt && exit 1 || true

  build-linux:
    name: Build (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential \
            libgl1-mesa-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-gfx-dev \
            libopenal-dev \
            libboost-system-dev libboost-signals2-dev \
            libsqlite3-dev \
            xvfb

      - name: Configure (Debug)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (Debug)
        run: cmake --build build --parallel $(nproc)

      - name: Test (Debug)
        run: ctest --test-dir build --output-on-failure

      - name: Smoke test Quick Match
        run: |
          chmod +x tests/run_menu_smoke.sh
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_quick_match.config" 40 \
            "[menu-smoke] Main menu ready, opening Quick Match" \
            "[menu-smoke] Gameplay page reached and live match is active" \
            "[menu-smoke] Quick Match verification succeeded, quitting test run"

      - name: Smoke test Full Match
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_full_match.config" 260 \
            "[menu-smoke] Main menu ready, opening Quick Match" \
            "[menu-smoke] Full match complete:" \
            "[menu-smoke] Full-match verification succeeded, quitting test run"

      - name: Smoke test League Mode
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] League save created, entering league page" \
            "[menu-smoke] League page flow succeeded"

      - name: Smoke test League Dashboard
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league_dashboard.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] League page ready, opening dashboard" \
            "[menu-smoke] League dashboard reached successfully"

      - name: Smoke test League Inbox
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league_inbox.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] League dashboard opening Inbox" \
            "[menu-smoke] League inbox reached successfully"

      - name: Smoke test League Calendar
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league_calendar.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] League dashboard opening Calendar" \
            "[menu-smoke] League calendar reached successfully"

      - name: Smoke test League Standings
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league_standings.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] Standings page opening league standings" \
            "[menu-smoke] League standings table reached successfully"

      - name: Smoke test League Team
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league_team.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] Team management opening player overview" \
            "[menu-smoke] Team player overview reached successfully"

      - name: Smoke test League Management
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league_management.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] League dashboard opening Management" \
            "[menu-smoke] League management reached successfully"

      - name: Smoke test League System
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_league_system.config" 90 \
            "[menu-smoke] Main menu ready, opening League Mode" \
            "[menu-smoke] System page opening settings" \
            "[menu-smoke] League system settings reached successfully"

      - name: Smoke test Options
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_settings.config" 40 \
            "[menu-smoke] Main menu ready, opening Options" \
            "[menu-smoke] Options page reached successfully"

      - name: Smoke test Credits
        run: |
          cd build
          ../tests/run_menu_smoke.sh ./gameplayfootball "${GITHUB_WORKSPACE}/data/menu_smoke_credits.config" 40 \
            "[menu-smoke] Main menu ready, opening Credits" \
            "[menu-smoke] Credits page reached successfully"

      - name: Configure (Release)
        run: |
          cmake -S . -B build-release \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build-release --parallel $(nproc)

  build-macos:
    name: Build (macOS 14)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install \
            cmake \
            sdl2 sdl2_image sdl2_ttf sdl2_gfx \
            boost openal-soft sqlite

      - name: Configure (Debug)
        run: |
          cmake -S . -B build-macos \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (Debug)
        run: cmake --build build-macos --parallel 3

      - name: Test (Debug)
        run: ctest --test-dir build-macos --output-on-failure

      - name: Configure (Release)
        run: |
          cmake -S . -B build-macos-release \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build-macos-release --parallel 3

  build-windows:
    name: Build (Windows 2022 + MSVC + vcpkg)
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics

      - name: Install dependencies (vcpkg)
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet $env:VCPKG_DEFAULT_TRIPLET `
            boost-system boost-thread boost-filesystem `
            sdl2 sdl2-image[libjpeg-turbo] sdl2-ttf sdl2-gfx `
            opengl openal-soft sqlite3

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-win `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=$env:VCPKG_DEFAULT_TRIPLET

      - name: Build (Debug)
        shell: pwsh
        run: cmake --build build-win --config Debug --parallel

      - name: Test (Debug)
        shell: pwsh
        run: ctest --test-dir build-win -C Debug --output-on-failure

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build-win --config Release --parallel

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameplayfootball-windows-x64
          path: build-win/Release/gameplayfootball.exe
          if-no-files-found: warn

  # Task 5.1: build Doxygen HTML docs and upload as a CI artifact
  docs:
    name: Generate Doxygen docs
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends doxygen graphviz cmake build-essential

      - name: Generate Doxyfile from template
        run: |
          cmake -S . -B /tmp/build-docs \
            -DGAMEPLAYFOOTBALL_BUILD_GAME=OFF \
            -DBUILD_TESTING=OFF \
            -DGAMEPLAYFOOTBALL_BUILD_DOCS=ON \
            -DCMAKE_FIND_PACKAGE_PREFER_CONFIG=OFF

      - name: Generate docs
        run: doxygen Doxyfile

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameplayfootball-docs
          path: docs/html/
          if-no-files-found: error
